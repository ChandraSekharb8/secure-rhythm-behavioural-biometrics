<!DOCTYPE html>
<html>
<head>
    <title>Typing Biometrics</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        textarea {
            width: 100%;
            height: 100px;
            font-size: 18px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-top: 10px;
        }
        #results {
            margin-top: 15px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<h2>Typing Biometrics Collector</h2>
<p>Type something in the box below. Click "Finish" when done.</p>

<textarea id="typingBox" placeholder="Start typing..."></textarea>
<br>
<button onclick="finishTyping()">Finish</button>

<h3>Results:</h3>
<div id="results"></div>

<script>
    let pressTimes = {};
    let dwellTimes = [];
    let flightTimes = [];
    let lastReleaseTime = null;

    const box = document.getElementById("typingBox");

    // Key Press
    box.addEventListener("keydown", (e) => {
        let now = performance.now();
        pressTimes[e.code] = now;

        if (lastReleaseTime !== null) {
            flightTimes.push(now - lastReleaseTime);
        }
    });

    // Key Release
    box.addEventListener("keyup", (e) => {
        let now = performance.now();

        if (pressTimes[e.code] !== undefined) {
            dwellTimes.push(now - pressTimes[e.code]);
        }

        lastReleaseTime = now;
    });

    function finishTyping() {

        let resultsText = "";

        // Show all dwell values
        resultsText += "Dwell Times (ms):\n";
        dwellTimes.forEach((time, index) => {
            resultsText += "Key " + (index + 1) + ": " + time.toFixed(2) + " ms\n";
        });

        // Show all flight values
        resultsText += "\nFlight Times (ms):\n";
        flightTimes.forEach((time, index) => {
            resultsText += "Flight " + (index + 1) + ": " + time.toFixed(2) + " ms\n";
        });

        // Calculate averages
        let avgDwell = dwellTimes.length > 0 
            ? dwellTimes.reduce((a,b) => a+b, 0) / dwellTimes.length 
            : 0;

        let avgFlight = flightTimes.length > 0 
            ? flightTimes.reduce((a,b) => a+b, 0) / flightTimes.length 
            : 0;

        resultsText += "\n----------------------------\n";
        resultsText += "Average Dwell Time: " + avgDwell.toFixed(2) + " ms\n";
        resultsText += "Average Flight Time: " + avgFlight.toFixed(2) + " ms\n";

        document.getElementById("results").innerText = resultsText;

        // Reset for reuse
        pressTimes = {};
        dwellTimes = [];
        flightTimes = [];
        lastReleaseTime = null;
    }
</script>

</body>
</html>
